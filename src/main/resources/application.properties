spring.application.name=ItHub-Menu
# PostgreSQL settings (MUST be provided via environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Liquibase
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.liquibase.enabled=${LIQUIBASE_ENABLED:true}
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
# Optional separate Liquibase credentials (fallback to datasource credentials)
spring.liquibase.user=${LIQUIBASE_USERNAME:${spring.datasource.username}}
spring.liquibase.password=${LIQUIBASE_PASSWORD:${spring.datasource.password}}

# Helpful SQL error details during local development
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true