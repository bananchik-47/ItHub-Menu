<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${dish.id} ? 'Редактировать блюдо - Панель администратора' : 'Добавить новое блюдо - Панель администратора'">Форма блюда</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script th:src="@{/script.js}"></script>
</head>
<body>
<header class="header">
    <div class="container">
        <nav class="navbar">
            <div class="logo">Панель администратора</div>
            <div class="nav-links">
                <a href="/menu" class="nav-link">Меню</a>
                <a href="/admin" class="nav-link">Панель управления</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="admin-login-btn">Выход</button>
                </form>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </nav>
    </div>
</header>

<main class="main-content">
    <div class="container">
        <h1 class="page-title" th:text="${dish.id} ? 'Редактировать блюдо' : 'Добавить новое блюдо'">Форма блюда</h1>
        
        <div class="admin-form-container fade-in-element">
            <form th:action="@{/admin/save}" th:object="${dish}" method="post" id="dishForm" class="dish-form">
                <input type="hidden" th:field="*{id}">
                
                <div class="form-group">
                    <label for="name" class="form-label">Название:</label>
                    <input type="text" id="name" class="form-input" th:field="*{name}" required minlength="2" maxlength="100">
                    <div class="form-error" id="name-error"></div>
                </div>
                
                <div class="form-group">
                    <label for="price" class="form-label">Цена:</label>
                    <input type="number" id="price" class="form-input" th:field="*{price}" required min="0" max="99999">
                    <div class="form-error" id="price-error"></div>
                </div>
                
                <div class="form-group">
                    <label for="description" class="form-label">Описание:</label>
                    <textarea id="description" class="form-input" th:field="*{description}" required minlength="5" maxlength="500" rows="4"></textarea>
                    <div class="form-error" id="description-error"></div>
                </div>
                
                <div class="form-group">
                    <label for="imageUrl" class="form-label">URL изображения:</label>
                    <input type="url" id="imageUrl" class="form-input" th:field="*{imageUrl}" required>
                    <div class="form-error" id="imageUrl-error"></div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" th:text="${dish.id} ? 'Обновить блюдо' : 'Создать блюдо'">Сохранить</button>
                    <a th:href="@{/admin}" class="btn btn-outline">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    // Валидация формы
    document.getElementById('dishForm').addEventListener('submit', function(e) {
        let isValid = true;
        
        // Очистка предыдущих сообщений об ошибках
        document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
        
        // Валидация названия
        const name = document.getElementById('name').value.trim();
        if (name.length < 2) {
            document.getElementById('name-error').textContent = 'Название должно содержать не менее 2 символов';
            isValid = false;
        }
        
        // Валидация цены
        const price = document.getElementById('price').value;
        if (price <= 0) {
            document.getElementById('price-error').textContent = 'Цена должна быть положительной';
            isValid = false;
        }
        
        // Валидация описания
        const description = document.getElementById('description').value.trim();
        if (description.length < 5) {
            document.getElementById('description-error').textContent = 'Описание должно содержать не менее 5 символов';
            isValid = false;
        }
        
        // Валидация URL изображения
        const imageUrl = document.getElementById('imageUrl').value.trim();
        if (imageUrl) {
            try {
                new URL(imageUrl);
            } catch (e) {
                document.getElementById('imageUrl-error').textContent = 'Введите корректный URL изображения';
                isValid = false;
            }
        }
        
        if (!isValid) {
            e.preventDefault();
        }
    });
    
    // Адаптивность для мобильных устройств
    function handleMobileForm() {
        const isMobile = window.innerWidth <= 768;
        const formGroups = document.querySelectorAll('.form-group');
        
        if (isMobile) {
            formGroups.forEach(group => {
                group.style.marginBottom = '1.2rem';
            });
        }
        
        window.addEventListener('resize', function() {
            const isMobileNow = window.innerWidth <= 768;
            if (isMobileNow) {
                formGroups.forEach(group => {
                    group.style.marginBottom = '1.2rem';
                });
            } else {
                formGroups.forEach(group => {
                    group.style.marginBottom = '1.5rem';
                });
            }
        });
    }
    
    // Вызов функции при загрузке
    document.addEventListener('DOMContentLoaded', handleMobileForm);
</script>
</body>
</html>
