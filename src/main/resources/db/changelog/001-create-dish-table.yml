databaseChangeLog:
  - changeSet:
      id: 001-create-dish-table
      author: admin
      changes:
        - createTable:
            tableName: dish
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: price
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: VARCHAR(500)
                  constraints:
                    nullable: false

              - column:
                  name: image_url
                  type: VARCHAR(500)
                  constraints:
                    nullable: false