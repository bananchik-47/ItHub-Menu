<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
</head>
<body>
<h1>College Canteen Menu</h1>
<div th:if="${#lists.isEmpty(dishes)}">No dishes available.</div>
<ul th:if="${not #lists.isEmpty(dishes)}">
    <li th:each="dish : ${dishes}">
        <h3 th:text="${dish.name}">Dish name</h3>
        <p th:text="${dish.description}">Description</p>
        <strong th:text="${dish.price}">0</strong>
    </li>
</ul>
</body>
</html>
