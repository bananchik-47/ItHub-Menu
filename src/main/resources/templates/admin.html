<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора - ItHub Столовая</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script th:src="@{/script.js}"></script>
</head>
<body>
<header class="header">
    <div class="container">
        <nav class="navbar">
            <div class="logo">Панель администратора</div>
            <div class="nav-links">
                <a href="/menu" class="nav-link">Меню</a>
                <a href="/admin" class="nav-link">Панель управления</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="admin-login-btn">Выход</button>
                </form>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </nav>
    </div>
</header>

<main class="main-content">
    <div class="container">
        <h1 class="page-title">Панель управления администратора</h1>
        
        <div class="admin-actions">
            <a th:href="@{/admin/add}" class="btn btn-primary">Добавить блюдо</a>
        </div>
        
        <div th:if="${#lists.isEmpty(dishes)}" class="empty-message">
            <p>Блюда пока отсутствуют.</p>
        </div>
        
        <table class="admin-table" th:if="${not #lists.isEmpty(dishes)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Цена</th>
                    <th>Описание</th>
                    <th>URL изображения</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr class="fade-in-element" th:each="dish : ${dishes}">
                    <td th:text="${dish.id}">ID</td>
                    <td th:text="${dish.name}">Блюдо</td>
                    <td th:text="${dish.price} + '₽'">0₽</td>
                    <td th:text="${dish.description}">Описание</td>
                    <td th:text="${dish.imageUrl}">URL изображения</td>
                    <td class="action-buttons">
                        <a th:href="@{/admin/edit/{id}(id=${dish.id})}" class="btn btn-outline">Редактировать</a>
                        <a th:href="@{/admin/delete/{id}(id=${dish.id})}" class="btn btn-danger"
                           onclick="return confirm('Вы уверены, что хотите удалить это блюдо?')">Удалить</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
