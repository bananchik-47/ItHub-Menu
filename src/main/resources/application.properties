spring.application.name=ItHub-Menu

# PostgreSQL settings (override via environment variables)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ithub_menu}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Liquibase
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Helpful SQL error details during local development
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true