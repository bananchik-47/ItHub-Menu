<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка - ItHub Столовая</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script th:src="@{/script.js}"></script>
</head>
<body>
<header class="header">
    <div class="container">
        <nav class="navbar">
            <div class="logo">ItHub Столовая</div>
            <div class="nav-links">
                <a href="/menu" class="nav-link">Меню</a>
                <a href="#" class="nav-link">Контакты</a>
                <button class="admin-login-btn" onclick="location.href='/login'">Вход для администратора</button>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </nav>
    </div>
</header>

<main class="main-content">
    <div class="container">
        <h1 class="page-title">Упс! Что-то пошло не так</h1>
        <div class="error-container">
            <div class="error-content">
                <h2 th:text="${status} + ' - ' + ${error}">Ошибка</h2>
                <p th:text="${errorMessage} ?: 'Произошла непредвиденная ошибка.'">Непредвиденная ошибка</p>
                <p class="error-details" th:if="${message}">
                    Детали: <span th:text="${message}"></span>
                </p>
                <a th:href="@{/menu}" class="btn btn-primary">Вернуться к меню</a>
            </div>
        </div>
    </div>
</main>

</body>
</html>
