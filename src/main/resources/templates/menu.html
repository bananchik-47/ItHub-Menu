<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню столовой</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
<div class="container">
    <h1>Меню столовой</h1>

    <div class="menu-grid">
        <!-- Блюдо 1 -->
        <div class="menu-item">
            <img src="https://via.placeholder.com/200x150" alt="Картошка фри">
            <h3>Картошка фри</h3>
            <p class="description">Золотистая картошка, обжаренная до хруста</p>
            <div class="info">
                <span class="price">120 ₽</span>
                <span class="portion">150 г</span>
            </div>
        </div>

        <!-- Блюдо 2 -->
        <div class="menu-item">
            <img src="https://via.placeholder.com/200x150" alt="Цезарь с курицей">
            <h3>Цезарь с курицей</h3>
            <p class="description">Свежий салат с куриной грудкой и фирменным соусом</p>
            <div class="info">
                <span class="price">280 ₽</span>
                <span class="portion">250 г</span>
            </div>
        </div>

        <!-- Блюдо 3 -->
        <div class="menu-item">
            <img src="https://via.placeholder.com/200x150" alt="Борщ">
            <h3>Борщ</h3>
            <p class="description">Традиционный борщ со сметаной</p>
            <div class="info">
                <span class="price">180 ₽</span>
                <span class="portion">300 мл</span>
            </div>
        </div>

        <!-- Блюдо 4 -->
        <div class="menu-item">
            <img src="https://via.placeholder.com/200x150" alt="Компот">
            <h3>Компот</h3>
            <p class="description">Домашний компот из сухофруктов</p>
            <div class="info">
                <span class="price">90 ₽</span>
                <span class="portion">200 мл</span>
            </div>
        </div>
    </div>

    <button class="pay-button" onclick="window.open('https://sberbank.ru', '_blank')">
        Оплатить через Сбер
    </button>
</div>
</body>
</html>
