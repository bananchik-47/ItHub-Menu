<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в панель администратора - ItHub Столовая</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script th:src="@{/script.js}"></script>
</head>
<body>
<header class="header">
    <div class="container">
        <nav class="navbar">
            <div class="logo">ItHub Столовая</div>
            <div class="nav-links">
                <a href="/menu" class="nav-link">Меню</a>
                <!-- <a href="#" class="nav-link">Контакты</a> -->
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </nav>
    </div>
</header>

<main class="main-content">
    <div class="container">
        <h1 class="page-title">Вход в панель администратора</h1>
        
        <div class="admin-form-container fade-in-element" style="max-width: 500px;">
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">Имя пользователя:</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Введите имя пользователя" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Пароль:</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Введите пароль" required>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Войти</button>
                    <a th:href="@{/menu}" class="btn btn-outline">Назад к меню</a>
                </div>
                
                <div th:if="${param.error}" class="error-message" style="color: #e74c3c; margin-top: 10px;">
                    <p>Неверное имя пользователя или пароль</p>
                </div>
                
                <div th:if="${param.logout}" class="success-message" style="color: #2ecc71; margin-top: 10px;">
                    <p>Вы успешно вышли из системы</p>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
